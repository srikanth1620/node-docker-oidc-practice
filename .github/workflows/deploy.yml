name: Deploy Node.js Docker App to Azure (Practice)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC Login to Azure
      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Login to the new ACR
      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: nodeoidcpracticeacr.azurecr.io

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            nodeoidcpracticeacr.azurecr.io/node-docker-practice:${{ github.sha }}
            nodeoidcpracticeacr.azurecr.io/node-docker-practice:latest

      # Deploy to Azure App Service
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'node-docker-practice-app'     # New app name for this practice run
          slot-name: 'Production'
          images: 'nodeoidcpracticeacr.azurecr.io/node-docker-practice:${{ github.sha }}'