name: Deploy Node.js Docker App to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR (for push)
        run: az acr login --name nodeoidcpracticeacr

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            nodeoidcpracticeacr.azurecr.io/node-docker-practice:${{ github.sha }}
            nodeoidcpracticeacr.azurecr.io/node-docker-practice:latest

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'node-docker-practice-app'
          slot-name: 'Production'
          images: 'nodeoidcpracticeacr.azurecr.io/node-docker-practice:${{ github.sha }}'
          # Use admin credentials for pull (Option 2)
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}